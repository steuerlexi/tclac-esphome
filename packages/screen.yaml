time:
  - platform: homeassistant
    id: my_time

sensor:
  - platform: wifi_signal
    id: wifi_strength
    internal: true
    update_interval: 20s
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);

font:
  - file: "gfonts://Press Start 2P"
    id: font1
    size: 16
    bpp: 1
    glyphs: '!"%()+=,-_.:掳/?0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz袗袘袙袚袛袝袞袟袠袣袥袦袧袨袩袪小孝校肖啸笑效楔些歇鞋协挟携蝎邪斜胁谐写械卸蟹懈泻谢屑薪芯锌褉褋褌褍褎褏褑褔褕褖褗褘褜褝褞褟'

  - file: "gfonts://Press Start 2P"
    id: font2
    size: 8
    bpp: 1
    glyphs: '!"%()+=,-_.:掳/?0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz袗袘袙袚袛袝袞袟袠袣袥袦袧袨袩袪小孝校肖啸笑效楔些歇鞋协挟携蝎邪斜胁谐写械卸蟹懈泻谢屑薪芯锌褉褋褌褍褎褏褑褔褕褖褗褘褜褝褞褟'

i2c:
  sda: GPIO0
  scl: GPIO2
  frequency: 400kHz

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x32"
    address: 0x3C
    rotation: 0
    id: oled_disp
    lambda: |-
      if (id(${device_name}_wifi).is_connected()){
        auto time = id(my_time).now();
        id(oled_disp).strftime(0, 0, id(font2), "%H:%M", time);
        id(oled_disp).line(0, 11, 127, 11);

        if (id(${device_name}climate).mode == CLIMATE_MODE_OFF){
          id(oled_disp).print(0, 14, id(font1), "OFF");
        } else if (id(${device_name}climate).mode == CLIMATE_MODE_AUTO){
          id(oled_disp).print(0, 14, id(font1), "AUTO");
        } else if (id(${device_name}climate).mode == CLIMATE_MODE_COOL){
          id(oled_disp).print(0, 14, id(font1), "COOL");
        } else if (id(${device_name}climate).mode == CLIMATE_MODE_HEAT){
          id(oled_disp).print(0, 14, id(font1), "HEAT");
        } else if (id(${device_name}climate).mode == CLIMATE_MODE_DRY){
          id(oled_disp).print(0, 14, id(font1), "DRY");
        } else if (id(${device_name}climate).mode == CLIMATE_MODE_FAN_ONLY){
          id(oled_disp).print(0, 14, id(font1), "FAN");
        }

        if (id(beep_mode).state){
          id(oled_disp).print(60, 0, id(font2), "B");
        }
        if (id(display_mode).state){
          id(oled_disp).print(80, 0, id(font2), "D");
        }
        if (id(wifi_strength).state > 20){
          id(oled_disp).filled_rectangle(109, 6, 3, 2);
        }
        if (id(wifi_strength).state > 50){
          id(oled_disp).filled_rectangle(114, 4, 3, 4);
        }
        if (id(wifi_strength).state > 70){
          id(oled_disp).filled_rectangle(119, 2, 3, 6);
        }
        if (id(wifi_strength).state > 85){
          id(oled_disp).filled_rectangle(124, 0, 3, 8);
        }
      }
      else {
        id(oled_disp).print(0, 0, id(font1), "Ready!");
      }
