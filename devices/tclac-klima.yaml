# Slim device config for the TCL Klima (XIAO ESP32-C6).
#
# Everything except the secrets comes from the git repo:
#   - the tclac component and this file's package are pulled from
#     github.com/steuerlexi/tclac-esphome (see `packages:` below and the
#     external_components inside core.yaml), and
#   - the package (packages/core.yaml in the repo) provides the boilerplate:
#     external_components, on_boot, uart, api, ota, logger, all switches and
#     selects.
#
# Only the secret VALUES live locally in secrets.yaml (gitignored). This file
# contains only !secret KEY references, so it is safe to commit.
#
# Required keys in your local secrets.yaml:
#   wifi_ssid, wifi_password,
#   tclac_klima__encryption_key, tclac_klima__ota_password

substitutions:
  device_name: tclac-klima
  humanly_name: TCL Klimaanlage
  uart_rx: GPIO16
  uart_tx: GPIO17
  climate_id: tclac_climate
  # Pulled from local secrets.yaml (these override the CHANGE_ME defaults
  # declared in packages/core.yaml).
  api_key: !secret tclac_klima__encryption_key
  ota_pass: !secret tclac_klima__ota_password

esp32:
  board: seeed_xiao_esp32c6
  variant: esp32c6
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  manual_ip:
    static_ip: 192.168.1.212
    gateway: 192.168.1.1
    subnet: 255.255.255.0
    dns1: 192.168.1.2
  reboot_timeout: 15min
  on_connect:
    - logger.log: "WLAN verbunden!"
  on_disconnect:
    - logger.log: "WLAN getrennt!"

web_server:
  port: 80

safe_mode:
  disabled: false
  reboot_timeout: 10min
  num_attempts: 5

# Pulls packages/core.yaml from the repo over git. Provides external_components,
# on_boot, uart, api, ota, logger, switches (Beep/Display/Display on module/Force
# config) and selects (Vertical/Horizontal swing + fixing).
packages:
  tclac_core: github://steuerlexi/tclac-esphome/packages/core.yaml@master

# Device-specific climate platform (visual range + supported modes). Kept here
# rather than in the package because it varies per AC model.
climate:
  - platform: tclac
    name: ${humanly_name}
    id: ${climate_id}
    icon: mdi:air-conditioner
    visual:
      min_temperature: 16
      max_temperature: 31
      temperature_step: 1
    supported_modes:
      - 'OFF'
      - AUTO
      - COOL
      - HEAT
      - DRY
      - FAN_ONLY
    supported_fan_modes:
      - AUTO
      - QUIET
      - LOW
      - MIDDLE
      - MEDIUM
      - HIGH
      - FOCUS
      - DIFFUSE
    supported_swing_modes:
      - 'OFF'
      - VERTICAL
      - HORIZONTAL
      - BOTH
    supported_presets:
      - NONE
      - ECO
      - SLEEP
      - COMFORT
    beeper: false
    force_mode: false
    show_display: true